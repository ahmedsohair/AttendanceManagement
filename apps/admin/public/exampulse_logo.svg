<svg width="680" height="320" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>ExamPulse logo</title>
  <desc>ExamPulse logo featuring a pulse line mark and attendance tagline.</desc>
  <g transform="translate(108 100)">
    <rect x="0" y="0" width="64" height="64" rx="16" fill="#C8102E"/>
    <polyline points="6,32 18,32 26,12 36,52 44,22 52,32 58,32" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="190" y="155" fill="#1a1a1a" font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700">Exam<tspan fill="#C8102E" font-weight="400">Pulse</tspan></text>
  <text x="190" y="188" fill="#888" font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-size="15" letter-spacing="1">ATTENDANCE MADE SMART</text>
  <line x1="108" y1="220" x2="572" y2="220" stroke="#e8e8e8" stroke-width="0.5"/>
